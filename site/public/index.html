<!DOCTYPE html>
<html lang="en" data-theme="paper">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- Declare scheme-awareness so browser auto-dark / selective inversion (e.g. Vivaldi)
       defers to the site's own light/dark themes instead of force-inverting. -->
  <meta name="color-scheme" content="light dark" />
  <script>
    // Set the theme before first paint. Default to light ("paper"); honor a saved choice.
    (function () {
      try {
        var t = localStorage.getItem("jg-theme");
        document.documentElement.setAttribute("data-theme", (t === "terminal") ? "terminal" : "paper");
      } catch (e) {}
    })();
  </script>
  <title>jobgauge — labor-market instrument</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 28 28'%3E%3Crect width='28' height='28' rx='6' fill='%230E6E63'/%3E%3Cpath d='M5 19 L11 12 L15 16 L20 8' stroke='white' stroke-width='2' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3Ccircle cx='20' cy='8' r='2.2' fill='white'/%3E%3C/svg%3E" />
  <meta name="description" content="A calm, research-grade labor-market data instrument. Search, chart, compare, and export U.S. labor statistics." />

  <!-- Fonts: Space Grotesk (display), Hanken Grotesk (UI/body), IBM Plex Mono (data/tabular) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Hanken+Grotesk:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

  <!-- Apache ECharts (production charting library) -->
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>

  <link rel="stylesheet" href="assets/css/app.css?v=14" />
</head>
<body>
  <div id="app" class="app" data-booting="true">

    <!-- ============ TOP BAR ============ -->
    <header class="topbar">
      <a class="brand" href="?view=overview" data-nav="overview" aria-label="jobgauge home">
        <span class="brand__mark" aria-hidden="true">
          <svg viewBox="0 0 28 28" width="26" height="26" fill="none">
            <path d="M3 19 L9 12 L14 16 L19 7 L25 11" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="19" cy="7" r="2.4" fill="currentColor"/>
          </svg>
        </span>
        <span class="brand__word">jobgauge</span>
      </a>

      <button class="searchbar" id="searchTrigger" aria-label="Search all indicators (Command+K)">
        <svg class="searchbar__icon" viewBox="0 0 20 20" width="16" height="16" aria-hidden="true"><circle cx="9" cy="9" r="6" stroke="currentColor" stroke-width="1.6" fill="none"/><path d="M14 14 L18 18" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        <span class="searchbar__hint">Search “claims”, “Beveridge curve”, “Black unemployment”, “LFPR”…</span>
        <kbd class="searchbar__kbd"><span class="cmdkey">⌘</span>K</kbd>
      </button>

      <div class="topbar__right">
        <button class="freshness" id="freshnessBadge" title="Export profile and data freshness">
          <span class="freshness__dot" aria-hidden="true"></span>
          <span class="freshness__profile" id="profileLabel">hosted</span>
          <span class="freshness__sep">·</span>
          <span class="freshness__when" id="freshnessWhen">loading…</span>
        </button>
        <button class="iconbtn" id="themeToggle" aria-label="Toggle dark mode" title="Toggle theme">
          <svg class="ico-sun" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="12" r="4.2"/><path d="M12 2v2.5M12 19.5V22M2 12h2.5M19.5 12H22M5 5l1.8 1.8M17.2 17.2 19 19M19 5l-1.8 1.8M6.8 17.2 5 19" stroke-linecap="round"/></svg>
          <svg class="ico-moon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M20 14.5A8 8 0 1 1 9.5 4a6.3 6.3 0 0 0 10.5 10.5Z" stroke-linejoin="round"/></svg>
        </button>
        <button class="btn btn--accent" id="shareBtn">
          <svg viewBox="0 0 20 20" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.7" aria-hidden="true"><path d="M14 6.5 17 10l-3 3.5M3 10h13" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Share / Export
        </button>
      </div>
    </header>

    <div class="shell">
      <!-- ============ LEFT RAIL ============ -->
      <nav class="rail" aria-label="Primary">
        <div class="rail__sec">Workspace</div>
        <a class="rail__item" data-nav="overview" href="?view=overview">
          <svg viewBox="0 0 22 22" width="19" height="19" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="3" width="7" height="7" rx="1.2"/><rect x="12" y="3" width="7" height="7" rx="1.2"/><rect x="3" y="12" width="7" height="7" rx="1.2"/><rect x="12" y="12" width="7" height="7" rx="1.2"/></svg>
          <span>Overview</span>
        </a>
        <a class="rail__item" data-nav="explore" href="?view=explore">
          <svg viewBox="0 0 22 22" width="19" height="19" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="10" cy="10" r="6"/><path d="M14.5 14.5 19 19" stroke-linecap="round"/></svg>
          <span>Explore</span>
        </a>
        <a class="rail__item" data-nav="map" href="?view=map">
          <svg viewBox="0 0 22 22" width="19" height="19" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 5.5 L8.5 3.5 L14 5.5 L19 3.5 V16.5 L14 18.5 L8.5 16.5 L3 18.5 Z" stroke-linejoin="round"/><path d="M8.5 3.5 V16.5 M14 5.5 V18.5"/></svg>
          <span>State map</span>
        </a>
        <a class="rail__item" data-nav="themes" href="?view=themes">
          <svg viewBox="0 0 22 22" width="19" height="19" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 6h14M4 11h14M4 16h9" stroke-linecap="round"/></svg>
          <span>Themes</span>
        </a>
        <a class="rail__item" data-nav="about" href="?view=about">
          <svg viewBox="0 0 22 22" width="19" height="19" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="11" cy="11" r="8"/><path d="M11 10v5M11 7v.5" stroke-linecap="round"/></svg>
          <span>About the data</span>
        </a>
        <div class="rail__foot">
          <div class="rail__stat rail__stat--live"><b id="railAvail">—</b> live series</div>
          <div class="rail__stat"><b id="railCat">—</b> cataloged</div>
        </div>
      </nav>

      <!-- ============ MAIN ============ -->
      <main class="main" id="main">
        <div class="bootscreen" id="boot">
          <div class="bootscreen__mark">
            <svg viewBox="0 0 28 28" width="40" height="40" fill="none"><path d="M3 19 L9 12 L14 16 L19 7 L25 11" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="19" cy="7" r="2.4" fill="currentColor"/></svg>
          </div>
          <div class="bootscreen__txt">Loading the labor-market record…</div>
        </div>
      </main>
    </div>
  </div>

  <!-- ============ COMMAND PALETTE ============ -->
  <div class="palette" id="palette" hidden>
    <div class="palette__scrim" data-close-palette></div>
    <div class="palette__box" role="dialog" aria-modal="true" aria-label="Command and search palette">
      <div class="palette__head">
        <svg class="palette__icon" viewBox="0 0 20 20" width="18" height="18" aria-hidden="true"><circle cx="9" cy="9" r="6" stroke="currentColor" stroke-width="1.6" fill="none"/><path d="M14 14 L18 18" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        <input class="palette__input" id="paletteInput" type="text" autocomplete="off" spellcheck="false"
               role="combobox" aria-autocomplete="list" aria-expanded="false" aria-controls="paletteResults" aria-activedescendant=""
               placeholder="Search indicators, presets, and actions — try “laid off”, “wage inflation”, “ICSA”…" />
        <kbd class="palette__esc">Esc</kbd>
      </div>
      <div class="palette__results" id="paletteResults" role="listbox" aria-label="Search results"></div>
      <div class="palette__foot">
        <span><kbd>↑</kbd><kbd>↓</kbd> navigate</span>
        <span id="palHintEnter"><kbd>↵</kbd> open (replace)</span>
        <span id="palHintAdd"><kbd>⌘</kbd><kbd>↵</kbd> add to compare</span>
        <span class="palette__foot-spacer"></span>
        <span id="paletteCount"></span>
      </div>
    </div>
  </div>

  <!-- ============ SHARE / EXPORT SHEET ============ -->
  <div class="sheet" id="exportSheet" hidden>
    <div class="sheet__scrim" data-close-sheet></div>
    <div class="sheet__box" role="dialog" aria-modal="true" aria-label="Share and export">
      <div class="sheet__head">
        <h2>Share &amp; export</h2>
        <button class="iconbtn" data-close-sheet aria-label="Close">✕</button>
      </div>
      <div class="sheet__body" id="sheetBody"></div>
    </div>
  </div>

  <!-- ============ FOCUS / FULLSCREEN CHART ============ -->
  <div class="focus" id="focus" hidden>
    <div class="focus__scrim" data-close-focus></div>
    <div class="focus__box" role="dialog" aria-modal="true" aria-label="Focused chart">
      <div class="focus__head">
        <div class="focus__titlewrap">
          <div class="focus__kicker" id="focusKicker"></div>
          <h2 class="focus__title" id="focusTitle"></h2>
        </div>
        <div class="focus__actions">
          <button class="btn btn--sm" id="focusExport">Export</button>
          <button class="iconbtn" data-close-focus aria-label="Close (Esc)" title="Close (Esc)">✕</button>
        </div>
      </div>
      <div class="focus__controls" id="focusControls"></div>
      <div class="focus__chart" id="focusChart"></div>
      <div class="focus__foot" id="focusFoot"></div>
    </div>
  </div>

  <!-- toast -->
  <div class="toast" id="toast" hidden></div>

  <script type="module" src="assets/js/app.js?v=17"></script>
</body>
</html>
