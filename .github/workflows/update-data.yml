name: Update static data

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Refresh scope: core or all'
        required: true
        default: 'core'
        type: choice
        options:
          - core
          - all
  schedule:
    # Weekdays after major U.S. morning data releases. Adjust after backend signoff.
    - cron: '30 15 * * 1-5'

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Validate catalog
        run: make validate-catalog
      - name: Refresh core sources
        if: ${{ github.event_name == 'schedule' || inputs.mode == 'core' }}
        env:
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          BEA_API_KEY: ${{ secrets.BEA_API_KEY }}
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
          DOL_API_KEY: ${{ secrets.DOL_API_KEY }}
        run: |
          python -m labor_dashboard.cli refresh --providers bls,fred --groups core --start-year 1990
      - name: Refresh all sources
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'all' }}
        env:
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          BEA_API_KEY: ${{ secrets.BEA_API_KEY }}
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
          DOL_API_KEY: ${{ secrets.DOL_API_KEY }}
        run: |
          python -m labor_dashboard.cli refresh --start-year 1990
      - name: Export static files
        run: |
          make export-static
          make build-search
      - name: Commit generated static data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'data: refresh static dashboard data'
          file_pattern: site/public/data/** site/public/search/**
