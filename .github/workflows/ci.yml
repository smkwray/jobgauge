name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      # The Makefile defaults PYTHON to a local venv ($HOME/venvs/jobgauge);
      # on the runner, use the interpreter that `pip install -e` populated.
      PYTHON: python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Validate catalog
        run: make validate-catalog
      - name: Build search index
        run: make build-search
      - name: Dry-run refresh planning
        run: make dry-run
      - name: Tests
        run: make test
      - name: Data tools tests
        run: make data-tools-test
      - name: Data tools doctor smoke
        run: python3 tools/jobgauge_data.py --data site/public/data doctor --format json
      - name: Lint
        run: make lint
