indicators:
  - id: unemployment_rate
    title: Unemployment rate
    short_title: Unemployment rate
    provider: bls
    source_id: bls_public_api
    series_id: LNS14000000
    group: core
    subgroup: household
    priority: core
    frequency: M
    units: Percent
    seasonal_adjustment: SA
    geography: US
    start_year: 1948
    release: Employment Situation
    tags: [unemployment, slack, household, headline]
